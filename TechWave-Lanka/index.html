<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechWave Lanka ULTRA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
  color:white;
  overflow-x:hidden;
}

header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

h1{
  font-size:40px;
  background:linear-gradient(to right,#38bdf8,#818cf8);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

input{
  padding:12px;
  width:80%;
  margin-top:10px;
  border-radius:20px;
  border:none;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:20px;
  text-align:center;
  transition:0.4s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 25px rgba(56,189,248,0.5);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
  transition:0.4s;
}

.card:hover img{
  transform:scale(1.1);
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  background:linear-gradient(to right,#38bdf8,#818cf8);
  cursor:pointer;
  border-radius:20px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

.cart{
  position:fixed;
  right:15px;
  top:100px;
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  width:220px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.admin{
  padding:30px;
  background:#020617;
}

.fade-in{
  animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);} 
  to{opacity:1;transform:translateY(0);} 
}

</style>
</head>

<body>

<header>
<img src="logo.png" style="height:50px;">
<input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</header>

<section class="products" id="products"></section>

<div class="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<p>Total: Rs.<span id="total">0</span></p>
<button onclick="checkout()">WhatsApp</button>
<button onclick="payNow()">Pay Online</button>
</div>

<div class="admin">
<h2>Admin Panel</h2>
<input type="text" id="pname" placeholder="Product name">
<input type="number" id="pprice" placeholder="Price">
<input type="text" id="pimg" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>
</div>

<script>
let products=[
{name:"iPhone Cable",price:1500,img:"/attachments/Pzf3fPaYUunULzVJkvWtS.png"},
{name:"Gaming Mouse",price:3500,img:"https://via.placeholder.com/200"},
{name:"Keyboard",price:4500,img:"https://via.placeholder.com/200"},
{name:"Phone Case",price:1200,img:"https://via.placeholder.com/200"}
];

let cart=[];
let total=0;

function displayProducts(list=products){
const container=document.getElementById('products');
container.innerHTML="";
list.forEach((p,i)=>{
container.innerHTML+=`<div class="card fade-in" style="animation-delay:${i*0.1}s">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>Rs.${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`;
});
}

function searchProduct(){
let value=document.getElementById('search').value.toLowerCase();
let filtered=products.filter(p=>p.name.toLowerCase().includes(value));
displayProducts(filtered);
}

function addProduct(){
let name=document.getElementById('pname').value;
let price=document.getElementById('pprice').value;
let img=document.getElementById('pimg').value;
products.push({name,price,img});
displayProducts();
}

function addToCart(name,price){
cart.push({name,price});
total+=Number(price);
updateCart();
}

function updateCart(){
const list=document.getElementById('cartItems');
list.innerHTML="";
cart.forEach(item=>{
let li=document.createElement('li');
li.textContent=item.name+" Rs."+item.price;
list.appendChild(li);
});
document.getElementById('total').innerText=total;
}

function checkout(){
let delivery = total > 5000 ? 0 : 300;
let msg="Order:%0A";
cart.forEach(i=>{msg+=i.name+" Rs."+i.price+"%0A"});
msg+="Delivery: Rs."+delivery+"%0ATotal: Rs."+(total+delivery);
window.open("https://wa.me/94741735991?text="+msg);
}

function payNow(){
alert("Connect PayHere to enable real payments");
}

// scroll animation
window.addEventListener('scroll',()=>{
document.querySelectorAll('.card').forEach(card=>{
let top = card.getBoundingClientRect().top;
if(top < window.innerHeight-50){
card.style.opacity=1;
card.style.transform="translateY(0)";
}
});
});

displayProducts();
</script>

</body>
</html>
